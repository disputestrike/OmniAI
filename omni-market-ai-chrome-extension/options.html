<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniMarket AI - Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FDFBF7;
      color: #1a1a1a;
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #92400e, #ea580c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle { font-size: 14px; color: #6b5e4f; margin-bottom: 32px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #6b5e4f; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e8e0d4;
      border-radius: 8px;
      font-size: 14px;
      background: white;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #f59e0b; }
    .help { font-size: 12px; color: #9b8e7e; margin-top: 4px; }
    .btn {
      padding: 10px 24px;
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    .btn:hover { opacity: 0.9; }
    .saved { color: #166534; font-size: 13px; margin-left: 12px; display: none; }
    .saved.show { display: inline; }
  </style>
</head>
<body>
  <h1>OmniMarket AI Settings</h1>
  <p class="subtitle">Configure your Chrome extension preferences.</p>

  <div class="field">
    <label>API Base URL</label>
    <input type="url" id="apiUrl" placeholder="https://omnimarket-qkdagqf5.manus.space">
    <p class="help">Your OmniMarket AI instance URL. Leave blank for default.</p>
  </div>

  <div class="field">
    <label>Default Content Type</label>
    <input type="text" id="defaultContentType" placeholder="ad_copy_short">
    <p class="help">Default content type when generating from selected text.</p>
  </div>

  <button class="btn" id="save">Save Settings</button>
  <span class="saved" id="saved-msg">Settings saved!</span>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const { apiUrl, defaultContentType } = await chrome.storage.sync.get(["apiUrl", "defaultContentType"]);
      if (apiUrl) document.getElementById("apiUrl").value = apiUrl;
      if (defaultContentType) document.getElementById("defaultContentType").value = defaultContentType;
    });

    document.getElementById("save").addEventListener("click", async () => {
      await chrome.storage.sync.set({
        apiUrl: document.getElementById("apiUrl").value.replace(/\/$/, ""),
        defaultContentType: document.getElementById("defaultContentType").value,
      });
      const msg = document.getElementById("saved-msg");
      msg.classList.add("show");
      setTimeout(() => msg.classList.remove("show"), 2000);
    });
  </script>
</body>
</html>
