<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniMarket AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FDFBF7;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #e8e0d4;
      background: linear-gradient(135deg, #FDFBF7, #f5efe6);
    }
    .header h2 {
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(135deg, #92400e, #ea580c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>OmniMarket AI</h2>
  </div>
  <iframe id="app-frame" src="about:blank"></iframe>
  <script>
    (async () => {
      const { apiUrl } = await chrome.storage.sync.get("apiUrl");
      const baseUrl = apiUrl || "https://omnimarket-qkdagqf5.manus.space";
      document.getElementById("app-frame").src = `${baseUrl}/ai-agents`;
    })();
  </script>
</body>
</html>
